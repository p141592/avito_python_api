site_name: avito-py
site_description: Синхронный Python SDK для Avito API
site_url: https://p141592.github.io/avito_python_api/
repo_url: https://github.com/p141592/avito_python_api
repo_name: p141592/avito_python_api
edit_uri: edit/main/docs/site/

docs_dir: docs/site
site_dir: site

theme:
  name: material
  language: ru
  logo: assets/images/avito-mark.svg
  favicon: assets/images/avito-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - ru
        - en
  - gen-files:
      scripts:
        - docs/site/assets/_gen_reference.py
  - awesome-pages
  - literate-nav:
      nav_file: SUMMARY.md
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_section_style: table
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_source: false
            filters:
              - "!^_"
            members_order: source
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  version:
    provider: mike
    default: latest
